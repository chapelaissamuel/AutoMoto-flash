// APP ENGINE
// ═══════════════════════════════════════════════════════
function lsG(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch(e){return d}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
let favs=new Set(lsG('mf3_favs',[]));
let checks=lsG('mf3_checks',{});
let S={tab:'all',did:null,q:'',type:'',sort:'alpha'};
const $=i=>document.getElementById(i);
function go(p){Object.assign(S,p);R();window.scrollTo(0,0)}
function R(){$('app').innerHTML=render();bind()}
function render(){return S.did?renderDet():renderHome()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderHome(){
const q=S.q.toLowerCase().trim();
let docs=DB.filter(d=>{
const mq=!q||[d.nom,d.moteur,d.type,d.huile_moteur,d.bougies,d.transmission,d.notes||''].some(f=>f.toLowerCase().includes(q));
const mt=!S.type||d.type===S.type;
const mTab=S.tab==='all'||(S.tab==='favs'&&favs.has(d.id))||(S.tab==='motos'&&d.type==='Moto')||(S.tab==='voitures'&&d.type==='Voiture');
return mq&&mt&&mTab;
});
if(S.sort==='alpha')docs.sort((a,b)=>a.nom.localeCompare(b.nom));
else docs.sort((a,b)=>a.type.localeCompare(b.type)||a.nom.localeCompare(b.nom));
const mc=DB.filter(d=>d.type==='Moto').length,vc=DB.filter(d=>d.type==='Voiture').length;
return'<div class="hdr"><div class="hm"><div class="logo"><div class="lb">🔧</div><div class="lt"><h1>MOTO-FLASH</h1><div class="sv">VOTRE GARAGE · '+DB.length+' MODÈLES · v2.0</div></div></div><div class="hr2"><button class="ib" id="set-btn">⚙️</button></div></div>'
+'<div class="sz"><div class="sw"><span class="si2">🔍</span><input class="si" id="sq" placeholder="Tapez modèle (T-Max, Golf 7, KTM, Civic...)..." value="'+esc(S.q)+'"></div>'+(S.q?'<button class="cb show" id="clr-btn">✕</button>':'')+'</div>'
+'<div class="fr"><span class="fc'+(S.type===''?' on':'')+'" data-type="">TOUS ('+DB.length+')</span><span class="fc fm3'+(S.type==='Moto'?' on':'')+'" data-type="Moto">🏍️ MOTOS ('+mc+')</span><span class="fc fv2'+(S.type==='Voiture'?' on':'')+'" data-type="Voiture">🚗 VOITURES ('+vc+')</span></div></div>'
+'<div class="tabs"><div class="tab'+(S.tab==='all'?' on':'')+'" data-tab="all">📋 TOUS</div><div class="tab'+(S.tab==='motos'?' on':'')+'" data-tab="motos">🏍️ MOTOS</div><div class="tab'+(S.tab==='voitures'?' on':'')+'" data-tab="voitures">🚗 VOITURES</div><div class="tab'+(S.tab==='favs'?' on':'')+'" data-tab="favs">⭐'+(favs.size?' '+favs.size:'')+'</div></div>'
+'<div class="rb"><span class="rt">'+docs.length+' / '+DB.length+' MODÈLES</span><button class="sb" id="sort-btn">TRI: '+(S.sort==='alpha'?'A→Z':'TYPE')+'</button></div>'
+(docs.length===0?'<div class="stb"><span class="si3">🔧</span><p class="st">Aucun modèle trouvé.<br>Affinez la recherche ou le filtre.</p></div>'
:'<div class="dl">'+docs.map(d=>{
const isFav=favs.has(d.id);const col=d.type==='Moto'?'#E8000F':'#FF8C00';
const tm=d.type==='Moto'?'<span class="tg tm">MOTO</span>':'<span class="tg tv">VOITURE</span>';
return'<div class="dc" data-did="'+d.id+'"><div class="bb" style="background:'+col+'"></div><div class="di" style="border-color:'+col+'30">'+d.emoji+'</div><div class="dn"><div class="dt">'+esc(d.nom)+'</div><div class="ds">'+esc(d.moteur)+'</div><div class="dg">'+tm+'<span class="tg th">HUILE</span><span class="tg tp">PNEUS</span>'+(d.type==='Moto'?'<span class="tg tb">BOUGIE</span>':'')+'</div></div><button class="df'+(isFav?' on':'')+'" data-fav="'+d.id+'">'+(isFav?'⭐':'☆')+'</button><span class="da">›</span></div>';
}).join('')+'</div>')
+'<div class="bp"></div>';
}
function renderDet(){
const d=DB.find(x=>x.id===S.did);if(!d)return renderHome();
const col=d.type==='Moto'?'#E8000F':'#FF8C00';const isFav=favs.has(d.id);const ck=checks[d.id]||{};
return'<div class="hdr"><div class="hm"><div style="flex:1;min-width:0"><button class="bk" id="bk">◂ RETOUR</button></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="ib" id="fav-hdr">'+(isFav?'⭐':'☆')+'</button><button class="ib" id="set-btn">⚙️</button></div></div></div>'
+'<div class="dh"><div class="dbd" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'30">'+d.emoji+' '+d.type.toUpperCase()+'</div><div class="dn2">'+esc(d.nom)+'</div><div class="dsb">'+esc(d.moteur)+'</div></div>'
+'<div class="sc"><div class="sl">⚡ Infos essentielles</div></div>'
+'<div class="kg"><div class="kb"><div class="kl">🛢️ Huile moteur</div><div class="kv">'+esc(d.huile_moteur)+'</div></div><div class="kb"><div class="kl">🔌 Bougies</div><div class="kv">'+esc(d.bougies)+'</div></div><div class="kb"><div class="kl">🏎️ Pneus / Pression</div><div class="kv">'+esc(d.pneus_pression)+'</div></div><div class="kb"><div class="kl">⛓️ Transmission</div><div class="kv">'+esc(d.transmission)+'</div></div></div>'
+'<div class="sc"><div class="sl">🔧 Spécifications complètes</div></div>'
+'<div style="padding:0 14px 10px"><div class="stbl"><div class="sr hr"><div class="slb">DONNÉE</div><div class="svl">VALEUR TECHNIQUE</div></div><div class="sr"><div class="slb">🛢️ Huile</div><div class="svl">'+esc(d.huile_moteur)+'</div></div><div class="sr"><div class="slb">🔌 Bougies</div><div class="svl">'+esc(d.bougies)+'</div></div><div class="sr"><div class="slb">🏎️ Pneus</div><div class="svl">'+esc(d.pneus_pression)+'</div></div><div class="sr"><div class="slb">🛑 Freins</div><div class="svl">'+esc(d.freins)+'</div></div><div class="sr"><div class="slb">⛓️ Transm.</div><div class="svl">'+esc(d.transmission)+'</div></div></div></div>'
+(d.notes?'<div class="sc"><div class="sl">📝 Notes mécanicien</div><div class="ic"><p class="vl">'+esc(d.notes)+'</p></div></div>':'')
+(d.checklist&&d.checklist.length?'<div class="sc"><div class="sl">✅ Checklist intervention</div></div><div style="padding:0 14px 8px"><div class="ck">'+d.checklist.map((item,i)=>{const done=ck[i];return'<div class="ci" data-ci="'+i+'"><div class="cb2'+(done?' dn3':'')+'">'+( done?'✓':'')+'</div><div class="ct" style="'+(done?'opacity:.45;text-decoration:line-through':'')+'">'+esc(item)+'</div></div>';}).join('')+'</div></div>':'')
+'<div class="sc"><div class="sl">🔗 Source technique officielle</div></div>'
+'<a href="'+d.lien+'" target="_blank" rel="noopener noreferrer" class="fl"><div class="fi">📄</div><div class="fb"><div class="ftt">'+esc(d.nom)+' — Fiche officielle</div><div class="fs">Source constructeur · Sans pub · Sans garage</div></div><span class="fa">→</span></a>'
+'<div class="bp"></div>';
}
function openSettings(){
const div=document.createElement('div');div.className='mbg';
const mc=DB.filter(d=>d.type==='Moto').length,vc=DB.filter(d=>d.type==='Voiture').length;
div.innerHTML='<div class="md"><div class="mh">⚙️ Paramètres MOTO-FLASH v2</div>'
+'<div class="mr"><div><div class="ml">🔡 Tri par défaut</div></div><div style="display:flex;gap:6px">'
+[['alpha','A→Z'],['type','Type']].map(([k,l])=>'<button id="srt-'+k+'" style="padding:5px 11px;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid '+(S.sort===k?'var(--p)':'var(--b)')+';background:'+(S.sort===k?'rgba(232,0,15,.1)':'var(--c)')+';color:'+(S.sort===k?'var(--p)':'var(--lb)')+'">'+l+'</button>').join('')
+'</div></div>'
+'<div class="mr"><div><div class="ml">⭐ Favoris</div><div class="ms">'+favs.size+' fiche'+(favs.size!==1?'s':'')+' épinglée'+(favs.size!==1?'s':'')+'</div></div><button id="clr-favs" style="background:rgba(255,64,64,.1);color:#FF7070;border-radius:6px;padding:5px 11px;font-size:.72rem;font-weight:700;border:1px solid rgba(255,64,64,.18);cursor:pointer">Effacer</button></div>'
+'<div class="mr"><div><div class="ml">✅ Checklists</div><div class="ms">Réinitialiser toutes les coches</div></div><button id="clr-checks" style="background:rgba(255,64,64,.1);color:#FF7070;border-radius:6px;padding:5px 11px;font-size:.72rem;font-weight:700;border:1px solid rgba(255,64,64,.18);cursor:pointer">Reset</button></div>'
+'<div class="mr"><div><div class="ml">📊 Base de données</div><div class="ms">'+DB.length+' modèles · '+mc+' motos · '+vc+' voitures</div></div></div>'
+'<button id="close-modal" class="mbtn">✖ FERMER</button></div>';
document.body.appendChild(div);
[['alpha'],['type']].forEach(([k])=>$('srt-'+k)&&($('srt-'+k).onclick=()=>{S.sort=k;lsS('mf3_sort',k);div.remove();R()}));
$('clr-favs').onclick=()=>{if(confirm('Effacer tous les favoris ?')){favs=new Set();lsS('mf3_favs',[]);div.remove();R()}};
$('clr-checks').onclick=()=>{if(confirm('Réinitialiser toutes les checklists ?')){checks={};lsS('mf3_checks',{});div.remove();R()}};
$('close-modal').onclick=()=>div.remove();
div.onclick=e=>{if(e.target===div)div.remove()};
}
function bind(){
$('sq')&&$('sq').addEventListener('input',e=>go({q:e.target.value}));
$('clr-btn')&&$('clr-btn').addEventListener('click',()=>go({q:''}));
$('sort-btn')&&$('sort-btn').addEventListener('click',()=>go({sort:S.sort==='alpha'?'type':'alpha'}));
document.querySelectorAll('[data-tab]').forEach(t=>t.onclick=()=>go({tab:t.dataset.tab,q:'',type:''}));
document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>go({type:b.dataset.type===S.type&&b.dataset.type?'':b.dataset.type}));
document.querySelectorAll('.dc[data-did]').forEach(c=>c.onclick=e=>{if(e.target.closest('.df'))return;go({did:c.dataset.did})});
document.querySelectorAll('.df[data-fav]').forEach(b=>b.onclick=e=>{
e.stopPropagation();const id=b.dataset.fav;
if(favs.has(id))favs.delete(id);else favs.add(id);
lsS('mf3_favs',[...favs]);
b.classList.toggle('on',favs.has(id));b.textContent=favs.has(id)?'⭐':'☆';
const t=document.querySelector('[data-tab="favs"]');
if(t)t.textContent='⭐'+(favs.size?' '+favs.size:'');
});
$('bk')&&$('bk').addEventListener('click',()=>go({did:null}));
$('fav-hdr')&&$('fav-hdr').addEventListener('click',()=>{if(favs.has(S.did))favs.delete(S.did);else favs.add(S.did);lsS('mf3_favs',[...favs]);R();});
document.querySelectorAll('#set-btn').forEach(b=>b.onclick=openSettings);
document.querySelectorAll('.ci[data-ci]').forEach(item=>item.onclick=()=>{
const ci=+item.dataset.ci;if(!checks[S.did])checks[S.did]={};
checks[S.did][ci]=!checks[S.did][ci];lsS('mf3_checks',checks);
const box=item.querySelector('.cb2'),txt=item.querySelector('.ct');const done=checks[S.did][ci];
box.classList.toggle('dn3',done);box.textContent=done?'✓':'';
txt.style.opacity=done?'.45':'';txt.style.textDecoration=done?'line-through':'';
});
}
S.sort=lsG('mf3_sort','alpha');
R();
</script>
